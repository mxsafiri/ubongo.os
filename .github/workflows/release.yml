name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Python package (wheel + sdist) ───────────────────────
  python-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
        continue-on-error: true

  # ── Build standalone binaries per platform ─────────────────────
  binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: dist/ubongo-*

  # ── Build Tauri desktop app + DMG (macOS only) ─────────────────
  tauri-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Python server deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pyinstaller

      - name: Build Python sidecar (ubongo-server)
        run: |
          pyinstaller desktop/server/ubongo-server.spec --noconfirm
          # Move the built sidecar to where Tauri expects it
          mkdir -p desktop/src-tauri/binaries/ubongo-server
          mv dist/ubongo-server/ubongo-server desktop/src-tauri/binaries/ubongo-server/ubongo-server
          # Verify the sidecar landed where Tauri expects it
          ls -lh desktop/src-tauri/binaries/ubongo-server/ubongo-server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: desktop
        env:
          # Skip Apple code-signing for unsigned beta builds.
          # Remove these two lines once you have an Apple Developer cert in CI.
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SKIP_NOTARIZE: "true"

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find desktop/src-tauri/target/release/bundle/macos -name "*.dmg" | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "name=$(basename $DMG)" >> $GITHUB_OUTPUT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-dmg
          path: ${{ steps.dmg.outputs.path }}

  # ── Create GitHub Release with all artifacts ───────────────────
  release:
    needs: [python-package, binaries, tauri-dmg]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### macOS (Apple Silicon M1+)
            Download `ubongo_*.dmg` below, open it, drag to Applications.
            First launch: right-click → Open (bypasses unsigned-app warning).
            Or remove the quarantine flag:
            ```bash
            xattr -dr com.apple.quarantine /Applications/ubongo.app
            ```

            ### CLI only (all platforms — requires Python 3.11+)
            ```bash
            pip install ubongo
            ```

            ### Standalone binary (no Python needed)
            Download the binary for your OS below, then:
            - **macOS/Linux**: `chmod +x ubongo && ./ubongo start`
            - **Windows**: `ubongo.exe start`
