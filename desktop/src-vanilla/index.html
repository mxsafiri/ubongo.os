<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ubongo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Error toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Main overlay ── -->
  <div class="overlay-wrapper">
    <div class="border-ring">
      <div class="panel" id="panel">

        <!-- ── Header ── -->
        <header class="panel-header">
          <div class="wordmark">
            <div class="live-dot" id="live-dot"></div>
            ubongo
          </div>
          <div class="header-right">
            <div class="provider-badge free" id="provider-badge">
              <span class="badge-dot"></span>
              <span id="provider-label">Loading…</span>
            </div>
            <button class="close-btn" id="close-btn" title="Close (Esc)">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- ── Input area ── -->
        <div class="input-area">
          <button class="icon-btn" id="mic-btn" title="Voice input">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="4" y="1" width="6" height="8" rx="3" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1.5 7.5A5.5 5.5 0 0 0 7 13a5.5 5.5 0 0 0 5.5-5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="7" y1="13" x2="7" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <input
            class="input-field"
            id="query-input"
            type="text"
            placeholder="Ask anything or give me a task…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="send-btn" id="send-btn" title="Send (Enter)" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M12 7L2 2l2.5 5L2 12l10-5z" fill="white"/>
            </svg>
          </button>
        </div>

        <!-- ── Quick chips ── -->
        <div class="chips-row" id="chips-row">
          <button class="chip" data-scenario="files">📁 Find file</button>
          <button class="chip" data-scenario="apps">🚀 Open app</button>
          <button class="chip" data-scenario="web">🔍 Search web</button>
          <button class="chip" data-scenario="automate">⚡ Automate</button>
          <button class="chip" data-scenario="status">/status</button>
        </div>

        <!-- ── Content area ── -->
        <div class="content-area" id="content-area">
          <div class="content-header">
            <span class="content-label">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/>
                <path d="M5 3v2.5l1.5 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              TASK OUTPUT
            </span>
            <span class="model-tag" id="model-tag">—</span>
          </div>

          <!-- Steps view (shown during/after agentic tasks) -->
          <div class="steps" id="steps-view" style="display:none"></div>

          <!-- Response text (shown for plain queries) -->
          <div class="response-text" id="response-text" style="display:none"></div>

          <!-- Placeholder (default) -->
          <div class="placeholder" id="placeholder">
            Type a task or pick a chip to get started.<br/>
            <span style="opacity:.6">ubongo can open apps, find files, search the web, and more.</span>
          </div>
        </div>

        <!-- ── Usage bar ── -->
        <div class="usage-bar-wrap">
          <span class="usage-label">Queries</span>
          <div class="usage-track">
            <div class="usage-fill" id="usage-fill" style="width:0%"></div>
          </div>
          <span class="usage-count" id="usage-count">— / —</span>
        </div>

      </div><!-- /panel -->
    </div><!-- /border-ring -->
  </div><!-- /overlay-wrapper -->

  <script src="main.js"></script>
</body>
</html>
